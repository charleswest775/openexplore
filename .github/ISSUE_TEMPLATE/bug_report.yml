name: Bug Report
description: Report something that isn't working correctly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Open backup at '...'
        2. Click on '...'
        3. Run query '...'
        4. See error
    validations:
      required: true

  - type: input
    id: ios-version
    attributes:
      label: iOS Version
      description: What iOS version was the backup from?
      placeholder: "e.g., iOS 17.4"

  - type: dropdown
    id: backup-type
    attributes:
      label: Backup Type
      options:
        - Encrypted
        - Unencrypted
        - Unknown

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "e.g., 3.12.10"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., Windows 11, macOS 15, Ubuntu 24.04"

  - type: textarea
    id: logs
    attributes:
      label: Error Output / Logs
      description: Paste any error messages or console output
      render: shell
